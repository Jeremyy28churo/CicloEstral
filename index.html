<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granja Digital Integrada - Simulador</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --bg: #0e1117;
            --panel-bg: #0e1117;
            --border: #30363d;
            --text: #c9d1d9;
            --neon-cyan: #00ffff;
            --success: #2ea043;
            --error: #f85149;
            --warning: #d29922;
            --info: #58a6ff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
        }
        .browser-window {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--bg);
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0,255,255,0.1);
        }
        .window-header {
            background: #161b22;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 6px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .window-content { padding: 12px 20px; }
        
        .controls-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-play-pause {
            background: #21262d;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: 0.2s;
            min-width: 180px;
        }
        .btn-play-pause:hover {
            background: #30363d;
            border-color: #8b949e;
        }
        .slider-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 250px;
        }
        .slider-container label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #8b949e;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        
        .hud-alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 15px;
        }
        .hud-success { background: rgba(46, 160, 67, 0.15); border: 1px solid var(--success); color: #7ee787; }
        .hud-error { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--error); color: #ff7b72; }
        .hud-warning { background: rgba(210, 153, 34, 0.15); border: 1px solid var(--warning); color: #e3b341; }
        .hud-info { background: rgba(88, 166, 255, 0.15); border: 1px solid var(--info); color: #79c0ff; }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }
        .metric {
            display: flex;
            flex-direction: column;
        }
        .metric-label { font-size: 14px; color: #8b949e; margin-bottom: 5px; }
        .metric-value { font-size: 32px; font-weight: bold; color: white; }
        
        .plot-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            background: #0e1117;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Dashboard Header -->
        <div class="browser-window">
            <div class="window-header">
                <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
            </div>
            <div class="window-content">

            </div>
        </div>
        
        <!-- Controls -->
        <div class="controls-row">
            <button id="btnPlay" class="btn-play-pause">▶️ Reproducir (20s)</button>
            <div class="slider-container">
                <label>Desliza para avanzar el 'Día del Ciclo' manualmente:</label>
                <input type="range" id="timeSlider" min="0" max="100" step="0.1" value="0">
            </div>
        </div>
        
        <!-- HUD -->
        <div id="hudBox" class="hud-alert hud-info">Inicializando simulación...</div>
        
        <!-- Metrics -->

        </div>
        
        <!-- Plot -->

        </div>
    </div>

        const df = simData.data;
        const hudStates = simData.hud_states;
        const maxDays = simData.max_days;
        
        const slider = document.getElementById("timeSlider");
        slider.max = maxDays;
        
        const btnPlay = document.getElementById("btnPlay");
        const hudBox = document.getElementById("hudBox");
        const metFsh = document.getElementById("met-fsh");
        const metLh = document.getElementById("met-lh");
        const metE2 = document.getElementById("met-e2");
        const metP4 = document.getElementById("met-p4");
        const metPgf2 = document.getElementById("met-pgf2");
        
        // Colors
        const colors = {
            "FSH": "#BC8BFF", "LH": "#FF3366", "Estradiol (E2)": "#58A6FF",
            "Progesterona (P4)": "#00CC99", "PGF2α": "#FF4500"
        };
        
        let isPlaying = false;
        let currentDay = 0.0;
        let animationFrameId = null;
        let lastTime = 0;
        
        // 20s total duration
        const durationMs = 20000;
        const speedPerMs = maxDays / durationMs; 

        // Init Plotly
        function initPlot() {
            const traces = [
                { x: [], y: [], mode: 'lines', name: 'FSH', line: {color: colors['FSH'], width: 3.5}, hoverinfo: 'skip' },
                { x: [], y: [], mode: 'lines', name: 'LH', line: {color: colors['LH'], width: 3.5}, hoverinfo: 'skip' },
                { x: [], y: [], mode: 'lines', name: 'Estradiol (E2)', line: {color: colors['Estradiol (E2)'], width: 3.5}, hoverinfo: 'skip' },
                { x: [], y: [], mode: 'lines', name: 'Progesterona (P4)', line: {color: colors['Progesterona (P4)'], width: 3.5}, hoverinfo: 'skip' },
                { x: [], y: [], mode: 'lines', name: 'PGF2α', line: {color: colors['PGF2α'], width: 3.5}, hoverinfo: 'skip' }
            ];
            
            const layout = {
                template: 'plotly_dark',
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                margin: {l: 0, r: 0, t: 10, b: 0},
                xaxis: {title: 'Días del Ciclo', range: [0, maxDays], gridcolor: '#30363D', showgrid: true},
                yaxis: {title: 'Concentración Relativa (%)', range: [0, 105], gridcolor: '#30363D', showgrid: false},
                legend: {orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'right', x: 1},
                shapes: [
                    {
                        type: 'line', x0: 0, x1: 0, y0: 0, y1: 105,
                        line: {color: '#FFFFFF', width: 3, dash: 'solid'}
                    }
                ],
                annotations: [
                    {
                        x: 0, y: 105, text: 'DÍA 0.0', showarrow: false,
                        xanchor: 'left', yanchor: 'top', font: {color: '#FFF', size: 14}
                    }
                ]
            };
            
            Plotly.newPlot('plotlyChart', traces, layout, {displayModeBar: false, responsive: true});
            updateUI(0);
        }
        
        function updateUI(day) {
            // Find closest index
            let idx = 0;
            let minDiff = Infinity;
            for(let i=0; i<df.length; i++) {
                let diff = Math.abs(df[i]['Día'] - day);
                if(diff < minDiff) { minDiff = diff; idx = i; }
            }
            
            const row = df[idx];
            const hud = hudStates[idx];
            
            // Update Metrics
            metFsh.innerText = row['FSH'].toFixed(1) + '%';
            metLh.innerText = row['LH'].toFixed(1) + '%';
            metE2.innerText = row['Estradiol (E2)'].toFixed(1) + '%';
            metP4.innerText = row['Progesterona (P4)'].toFixed(1) + '%';
            metPgf2.innerText = row['PGF2α'].toFixed(1) + '%';
            
            // Update HUD
            hudBox.innerText = hud.text;
            hudBox.className = "hud-alert hud-" + hud.type;
            
            // Slice Plotly Data arrays
            // To be highly optimized for JS, we just feed the sliced arrays to Plotly.react
            const x = []; const fsh = []; const lh = []; const e2 = []; const p4 = []; const pgf2 = [];
            for(let i=0; i<=idx; i++) {
                x.push(df[i]['Día']);
                fsh.push(df[i]['FSH']);
                lh.push(df[i]['LH']);
                e2.push(df[i]['Estradiol (E2)']);
                p4.push(df[i]['Progesterona (P4)']);
                pgf2.push(df[i]['PGF2α']);
            }
            
            const updateTraces = {
                x: [x, x, x, x, x],
                y: [fsh, lh, e2, p4, pgf2]
            };
            
            const updateLayout = {
                'shapes[0].x0': day,
                'shapes[0].x1': day,
                'annotations[0].x': day,
                'annotations[0].text': 'DÍA ' + day.toFixed(1)
            };
            
            Plotly.update('plotlyChart', updateTraces, updateLayout);
        }
        
        function animate(time) {
            if (!isPlaying) return;
            
            if (lastTime !== 0) {
                const dt = time - lastTime;
                currentDay += dt * speedPerMs;
                
                if (currentDay >= maxDays) {
                    currentDay = maxDays;
                    isPlaying = false;
                    btnPlay.innerText = "▶️ Reproducir (20s)";
                }
                
                slider.value = currentDay;
                updateUI(currentDay);
            }
            
            lastTime = time;
            if (isPlaying) {
                animationFrameId = requestAnimationFrame(animate);
            } else {
                lastTime = 0;
            }
        }
        
        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                // Pause
                isPlaying = false;
                btnPlay.innerText = "▶️ Reanudar";
                cancelAnimationFrame(animationFrameId);
                lastTime = 0;
            } else {
                // Play
                if (currentDay >= maxDays) currentDay = 0.0;
                isPlaying = true;
                btnPlay.innerText = "⏸️ Pausar";
                animationFrameId = requestAnimationFrame(animate);
            }
        });
        
        slider.addEventListener('input', (e) => {
            currentDay = parseFloat(e.target.value);
            updateUI(currentDay);
            if (!isPlaying) {
                // Update text to match resume state if not at end
                if (currentDay < maxDays) btnPlay.innerText = "▶️ Reanudar";
                else btnPlay.innerText = "▶️ Reproducir (20s)";
            }
        });
        
        initPlot();
    </script>
